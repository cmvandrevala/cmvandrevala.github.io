<section id="contact">
    <div class="row section-head">
        <div class="two columns header-col">
            <h1><span>I Would Love to Hear From You!</span></h1>
        </div>
        <div class="ten columns">
            <p class="lead">Please feel free to contact me using the form below.</p>
        </div>
    </div>
    <div class="row">
        <div class="eight columns">
            <form  action="//formspree.io/cyrus.vandrevala@gmail.com" method="POST" name="contactForm" id="contactForm">
	 			<fieldset>
	 			    <div>
	 					<label for="contactName">Name <span class="required">*</span></label>
	 					<input type="text" name="contactName" id="contactName" required data-validation-required-message="Please enter your name.">
	 				</div>
	 				<div>
	 					<label for="contactEmail">Email Address <span class="required">*</span></label>
	 					<input type="email" name="_replyto" class="form-control" placeholder="Email Address" id="email" required data-validation-required-message="Please enter your email address.">
	 				</div>
		 			<div>
	 					<label for="contactSubject">Subject</label>
	 					<input type="text" name="contactName" placeholder="Name" id="name" required data-validation-required-message="Please enter your name.">
		 			</div>
	 				<div class="form-group col-xs-12 floating-label-form-group controls">
	 					<label>Message <span class="required">*</span></label>
	 					<textarea cols="50" rows="15" id="contactMessage" required data-validation-required-message="Please enter a message."></textarea>
	 				</div>
	 			<br>
	 			<div class="row">
	 				<div class="form-group col-xs-12">
	 					<button class="submit">Send</button>
	 				</div>
	 			</div>
			</fieldset>
	 		</form>
	 	</div>
	 </div>


        <aside class="four columns footer-widgets">

           <div class="widget widget_contact">

				   <h4>Address and Phone</h4>
				   <p class="address">
					   <span>Cyrus Vandrevala</span><br>
					   <span>Purdue University<br>
						     PHYS Room 230<br>
						     525 Northwestern Avenue<br>
						     West Lafayette, IN 47906
				   </p>

			   </div>

           <div class="widget widget_tweets">

              <h4 class="widget-title">Latest Tweets from @CupcakePhysics</h4>

              <ul id="twitter">
				  <li>
<a class="twitter-timeline" href="https://twitter.com/CupcakePhysics" data-widget-id="687397649562103809">Tweets by @CupcakePhysics</a>

				  </li>
              </ul>

	         </div>

        </aside>

  </div>

</section> <!-- Contact Section End-->
